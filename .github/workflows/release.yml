name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Download LAME source
        run: |
          chmod +x setup_lame.sh
          ./setup_lame.sh

      - name: Build release APK
        run: |
          gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          # Generate self-signed keystore
          keytool -genkeypair \
            -keystore release.keystore \
            -alias mixtape \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mixtape123 \
            -keypass mixtape123 \
            -dname "CN=Mixtape, OU=Dev, O=Mixtape, L=Unknown, ST=Unknown, C=US"

          # Find build-tools version
          BUILD_TOOLS=$(ls -1 $ANDROID_HOME/build-tools/ | sort -V | tail -1)

          # Align
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release.apk \
            mixtape-aligned.apk

          # Sign
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-key-alias mixtape \
            --ks-pass pass:mixtape123 \
            --key-pass pass:mixtape123 \
            --out mixtape-release.apk \
            mixtape-aligned.apk

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Mixtape v${VERSION_NAME} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Automated build from commit ${{ github.sha }}.

            **Install:** Download `mixtape-release.apk`, transfer to your Android device, and install (enable "Install from unknown sources" if prompted).

            > This APK is signed with a self-signed key for testing purposes.
          files: mixtape-release.apk
          generate_release_notes: true
