name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Download LAME source
        run: |
          chmod +x setup_lame.sh
          ./setup_lame.sh

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sign APK with debug keystore
        run: |
          # Generate a self-signed keystore for release
          keytool -genkeypair \
            -keystore release.keystore \
            -alias mixtape \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mixtape123 \
            -keypass mixtape123 \
            -dname "CN=Mixtape, OU=Dev, O=Mixtape, L=Unknown, ST=Unknown, C=US"

          # Build release APK
          ./gradlew assembleRelease || true

          # If release build isn't configured, use the debug APK
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            # Align and sign
            ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 \
              app/build/outputs/apk/release/app-release-unsigned.apk \
              app/build/outputs/apk/release/app-release-aligned.apk

            ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
              --ks release.keystore \
              --ks-key-alias mixtape \
              --ks-pass pass:mixtape123 \
              --key-pass pass:mixtape123 \
              --out app/build/outputs/apk/release/mixtape-release.apk \
              app/build/outputs/apk/release/app-release-aligned.apk
          else
            # Fall back to debug APK (already signed with debug key)
            mkdir -p app/build/outputs/apk/release
            cp app/build/outputs/apk/debug/app-debug.apk \
               app/build/outputs/apk/release/mixtape-release.apk
          fi

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Mixtape v${VERSION_NAME} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Automated build from commit ${{ github.sha }}.

            **Install:** Download `mixtape-release.apk` below, transfer to your Android device, and install (enable "Install from unknown sources" if prompted).

            > This APK is signed with a self-signed key for testing purposes.
          files: app/build/outputs/apk/release/mixtape-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
